name: nutrishield1
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_database: ^12.1.2
  cloud_firestore: ^6.1.2

  # Google Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^13.0.1
  flutter_google_places_sdk: ^0.4.0
  geocoding: ^2.1.1

  # Routing & Navigation
  flutter_polyline_points: ^2.0.0 # ✅ REQUIRED for routes

  # Networking & External Apps
  http: ^1.2.0 # ✅ corrected
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
